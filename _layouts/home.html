<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <meta name="base-url" content="{{ '/' | relative_url | remove_last: '/' }}">
</head>

<body class="home-page" data-section="index">
  <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle-checkbox">
  <label for="sidebar-toggle" class="sidebar-toggle-button">Study Menu</label>
  <label for="sidebar-toggle" class="sidebar-overlay"></label>

  <div class="page-wrapper">
    {% include sidebar.html %}
    <div class="home-fullpage">
      {{ content }}
    </div>
  </div>

  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/streak.js' | relative_url }}"></script>
</body>
</html>
