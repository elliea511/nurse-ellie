<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">

  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/site-header.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/mh-cards.css' | relative_url }}">
  <meta name="base-url" content="{{ '/' | relative_url | remove_last: '/' }}">
</head>

<body data-section="{{ page.url | split: '/' | slice: 1, 1 | join: '' | split: '.' | first }}" data-page-type="{{ page.page_type | default: '' }}">
  <header class="prototype-topbar">
    <a class="prototype-brand" href="{{ '/' | relative_url }}" aria-label="Ellie's Nursing Notes home">
      <span class="brand-mark">♡</span>
      <span><strong>Ellie's Nursing Notes</strong><small>Learn clearly. Care confidently.</small></span>
    </a>
    <nav aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/all-topics.html' | relative_url }}">All Notes</a>
      <a href="{{ '/medical-emergencies/practice-quiz.html' | relative_url }}">Practice</a>
      <a href="{{ '/medical-emergencies/medications.html' | relative_url }}">Medications</a>
      <a class="nav-featured" href="{{ '/review.html' | relative_url }}">Quick Review</a>
    </nav>
  </header>
  
<input type="checkbox" id="sidebar-toggle" class="sidebar-toggle-checkbox">
<label for="sidebar-toggle" class="sidebar-toggle-button">Study Menu</label>
<label for="sidebar-toggle" class="sidebar-overlay"></label>
  
  <div class="page-wrapper">
    {% include sidebar.html %}

    <main class="main-content">
      {{ content }}
    </main>
  </div>

  <div class="font-controls">
    <button id="font-decrease" aria-label="Decrease font size">A−</button>
    <button id="font-increase" aria-label="Increase font size">A+</button>
  </div>

  <script src="{{ '/assets/js/dark-mode.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/mh-cards.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/font-size.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/back-to-top.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/annotate.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/confidence.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/streak.js' | relative_url }}"></script>
  <!-- print-btn disabled: <script src="{{ '/assets/js/print-btn.js' | relative_url }}"></script> -->
  <script src="{{ '/assets/js/flashcards.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/highlight-summary.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/quiz.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/practice-test.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/table-highlight.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/progress.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/print-btn.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>
</body>
</html>
