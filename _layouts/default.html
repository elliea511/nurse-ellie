<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">

  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/site-header.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/mh-cards.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% if page.page_type == 'med-browser' %}
  <link rel="stylesheet" href="{{ '/assets/css/med-browser.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% endif %}
  <meta name="base-url" content="{{ '/' | relative_url | remove_last: '/' }}">
</head>

<body data-section="{{ page.url | split: '/' | slice: 1, 1 | join: '' | split: '.' | first }}" data-page-type="{{ page.page_type | default: '' }}">
  <input type="checkbox" id="banner-menu-toggle" class="banner-menu-checkbox">
  <header class="prototype-topbar">
    <a class="prototype-brand" href="{{ '/' | relative_url }}" aria-label="Ellie's Nursing Notes home">
      <span class="brand-mark">♡</span>
      <span><strong>Ellie's Nursing Notes</strong><small>Learn clearly. Care confidently.</small></span>
    </a>

    <div class="sidebar-search banner-search">
      <input type="text" id="site-search" placeholder="Search notes…" autocomplete="off" spellcheck="false">
      <div id="search-results" class="search-results"></div>
    </div>

    <label for="banner-menu-toggle" class="banner-menu-button" aria-label="Toggle navigation menu">☰ <span>Menu</span></label>

    <nav class="banner-nav" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/all-topics.html' | relative_url }}">All Topics</a>
      <a href="{{ '/maternity.html' | relative_url }}">Maternity</a>
      <a href="{{ '/mental-health.html' | relative_url }}">Mental Health</a>
      <a href="{{ '/medical-emergencies.html' | relative_url }}">Medical Emergencies</a>
      <a href="{{ '/hematology-oncology.html' | relative_url }}">Heme / Onc</a>
      <a href="{{ '/ati/' | relative_url }}">ATI</a>
      <a class="nav-featured" href="{{ '/review.html' | relative_url }}">My Notes</a>
    </nav>
  </header>

  <div class="page-wrapper">
    <main class="main-content">
      {{ content }}
    </main>
  </div>

  <div class="font-controls">
    <button id="font-decrease" aria-label="Decrease font size">A−</button>
    <button id="font-increase" aria-label="Increase font size">A+</button>
  </div>

  <script src="{{ '/assets/js/dark-mode.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/mh-cards.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/font-size.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/back-to-top.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/annotate.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  {% if page.page_type == 'notes' %}
  <script src="{{ '/assets/js/confidence.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/print-btn.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  {% endif %}
  <script src="{{ '/assets/js/streak.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/flashcards.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/highlight-summary.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/quiz.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/practice-test.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/table-highlight.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/progress.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/lightbox.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
