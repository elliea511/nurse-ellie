<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | Nursing Study Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/prototype.css' | relative_url }}">
  <meta name="base-url" content="{{ '/' | relative_url | remove_last: '/' }}">
</head>
<body class="prototype prototype-note" data-section="medical-emergencies" data-page-type="notes">
  <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle-checkbox">
  <label for="sidebar-toggle" class="sidebar-toggle-button" aria-label="Open study menu">☰ <span>Study Menu</span></label>
  <label for="sidebar-toggle" class="sidebar-overlay"></label>

  <div class="page-wrapper">
    {% include sidebar.html %}

    <aside class="prototype-toc" aria-label="On this page">
      <a class="toc-brand" href="{{ '/test-home.html' | relative_url }}"><span>♡</span> Nursing Study Studio</a>
      <p>On this page</p>
      <nav id="prototype-toc-links"></nav>
      <a class="toc-quick" href="#final-nclex-review-chart">★ Quick facts</a>
    </aside>

    <main class="main-content prototype-note-content">
      <div class="note-breadcrumb"><a href="{{ '/medical-emergencies.html' | relative_url }}">Medical Emergencies</a><span>›</span>{{ page.title }}</div>
      {{ content }}
      <footer class="prototype-disclaimer">For study support only. Always follow your course materials, clinical policies, and instructor guidance.</footer>
    </main>
  </div>

  <div class="prototype-tools" aria-label="Study tools">
    <button id="font-decrease" aria-label="Decrease font size">A−</button>
    <button id="font-increase" aria-label="Increase font size">A+</button>
    <button id="prototype-theme" aria-label="Toggle dark mode">☾</button>
  </div>

  <script src="{{ '/assets/js/prototype.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/font-size.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/back-to-top.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/annotate.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/confidence.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/streak.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/flashcards.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/highlight-summary.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/quiz.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/practice-test.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/table-highlight.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/progress.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/print-btn.js' | relative_url }}"></script>
</body>
</html>
