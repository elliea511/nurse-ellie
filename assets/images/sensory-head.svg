    <path d="M318 338c18 31 27 68 24 112" stroke="url(#line)" stroke-width="3" stroke-linecap="round" opacity=".34"/>
    <path d="M332 342c20 15 42 22 68 21" stroke="url(#line)" stroke-width="2.6" stroke-linecap="round" opacity=".28"/>
    <circle cx="232" cy="274" r="58" fill="url(#cheek)"/>
  </g>

  <g aria-label="highlighted eye">
    <ellipse cx="161" cy="248" rx="37" ry="25" fill="#eaf3ff" opacity=".88"/>
    <path d="M124 248s14-20 37-20 38 20 38 20-15 20-38 20-37-20-37-20Z" fill="#fff" stroke="#276ee8" stroke-width="4" stroke-linejoin="round"/>
