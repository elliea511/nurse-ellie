    <path d="M178 197c44-21 108-28 188-6" fill="none" stroke="#c5b1f4" stroke-width="2" stroke-linecap="round" opacity=".35"/>
    <path d="M169 228c51-18 114-18 188 3" fill="none" stroke="#c5b1f4" stroke-width="2" stroke-linecap="round" opacity=".3"/>

    <path d="M185 200c-38 12-58 39-64 70 17-3 29 1 38 10-13 1-25 7-35 18 12 11 29 17 50 17" fill="#fbf8ff" opacity=".72"/>
    <path d="M190 201c-40 10-62 39-69 70 16-3 29 1 38 10-14 1-27 8-36 18 13 12 31 17 54 16" fill="none" stroke="url(#line)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity=".62"/>
    <path d="M150 263c12-11 27-13 44-4" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" opacity=".42"/>
    <path d="M158 306c15 6 31 7 49 4" stroke="url(#line)" stroke-width="2.4" stroke-linecap="round" opacity=".34"/>
