<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Sensory profile illustration</title>
  <desc id="desc">Soft side profile of a head with the eye highlighted in blue and the ear highlighted in coral.</desc>
  <defs>
    <linearGradient id="skin" x1="155" x2="350" y1="150" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8ff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#f2efff" stop-opacity=".78"/>
    </linearGradient>
    <linearGradient id="line" x1="120" x2="380" y1="90" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b79bf4"/>
      <stop offset="1" stop-color="#7f66d8"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0" cy="0" r="1" gradientTransform="matrix(55 0 0 40 232 274)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd2dd" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ffd2dd" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#6e5ba8" flood-opacity=".12"/>
    </filter>
  </defs>

