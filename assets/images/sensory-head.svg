    <path d="M373 150c-25-38-82-58-138-44-62 16-103 61-111 125-4 30 3 61 21 86 14 19 26 28 40 35" fill="none" stroke="url(#line)" stroke-width="3.5" stroke-linecap="round" opacity=".55"/>
    <path d="M226 141c-10 41-4 82 15 121" fill="none" stroke="#c5b1f4" stroke-width="2.2" stroke-linecap="round" opacity=".45"/>
    <path d="M258 125c-9 42-3 87 19 125" fill="none" stroke="#c5b1f4" stroke-width="2.2" stroke-linecap="round" opacity=".4"/>
    <path d="M289 119c-7 37-1 77 18 109" fill="none" stroke="#c5b1f4" stroke-width="2.2" stroke-linecap="round" opacity=".35"/>
