    <path d="M332 108c39 19 66 60 67 114 1 47-22 83-54 105-19 13-31 33-33 56l-5 76H206l10-84c2-21-6-41-22-55-35-31-54-77-49-128 8-84 101-126 187-84Z" fill="url(#skin)"/>
