  <g>
    <ellipse cx="169" cy="246" rx="53" ry="38" fill="url(#blueGlow)"/>
    <path d="M128 246s15-18 41-18 41 18 41 18-15 18-41 18-41-18-41-18Z" fill="#fff" stroke="#2876e8" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="169" cy="246" r="12" fill="#75b9ff"/>
    <circle cx="169" cy="246" r="6.5" fill="#1658d7"/>
    <circle cx="165" cy="242" r="2.7" fill="#fff"/>
    <path d="M139 234c9-6 19-9 31-9s22 3 31 9" stroke="#2876e8" stroke-width="3" stroke-linecap="round" opacity=".24"/>
