<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Sensory profile head</title>
  <desc id="desc">A soft left-facing profile head with the eye highlighted blue and the ear highlighted pink.</desc>
  <defs>
    <linearGradient id="faceFill" x1="126" x2="367" y1="96" y2="462" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffaff"/>
      <stop offset=".62" stop-color="#f4f0ff"/>
      <stop offset="1" stop-color="#ece7fb"/>
    </linearGradient>
    <linearGradient id="hairFill" x1="217" x2="401" y1="82" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#efe8ff"/>
      <stop offset="1" stop-color="#d8cdf7"/>
    </linearGradient>
    <linearGradient id="profileLine" x1="118" x2="366" y1="114" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#aa8ce8"/>
      <stop offset="1" stop-color="#755bd0"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="matrix(50 0 0 36 169 246)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5aa8ff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#5aa8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientTransform="matrix(55 0 0 70 323 258)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6f9e" stop-opacity=".36"/>
      <stop offset="1" stop-color="#ff6f9e" stop-opacity="0"/>
    </radialGradient>
    <filter id="portraitShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#7d66bf" flood-opacity=".12"/>
    </filter>
  </defs>

  <g filter="url(#portraitShadow)">
    <path d="M395 165c23 39 26 95 5 140-12 26-31 43-52 57-18 12-27 32-26 53l2 58H217l11-78c3-24-8-46-28-60-41-28-66-75-63-126 3-58 37-105 89-127 58-25 136 4 169 83Z" fill="url(#faceFill)"/>
    <path d="M252 88c70-9 128 28 151 86 15 39 14 77 2 111-16-67-57-101-119-108-56-7-106 11-145 45 0-65 42-125 111-134Z" fill="url(#hairFill)"/>
    <path d="M232 112c-10 46-2 86 22 124" fill="none" stroke="#c1acef" stroke-width="2.4" stroke-linecap="round" opacity=".5"/>
    <path d="M265 101c-9 47 0 93 26 131" fill="none" stroke="#c1acef" stroke-width="2.4" stroke-linecap="round" opacity=".44"/>
    <path d="M301 105c-6 41 2 80 24 112" fill="none" stroke="#c1acef" stroke-width="2.4" stroke-linecap="round" opacity=".38"/>
    <path d="M188 145c45-29 119-38 178-8" fill="none" stroke="#b9a2ec" stroke-width="2.4" stroke-linecap="round" opacity=".46"/>
    <path d="M166 183c56-24 130-25 207-1" fill="none" stroke="#b9a2ec" stroke-width="2.2" stroke-linecap="round" opacity=".34"/>

    <path d="M193 196c-41 11-66 39-73 77 17-4 30 0 39 10-14 1-28 8-38 21 16 16 38 22 65 18 21 36 55 58 102 63" fill="none" stroke="url(#profileLine)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
    <path d="M288 385c-7 26-5 57 6 92" fill="none" stroke="url(#profileLine)" stroke-width="4" stroke-linecap="round" opacity=".45"/>
    <path d="M334 365c25 27 39 64 38 107" fill="none" stroke="url(#profileLine)" stroke-width="4" stroke-linecap="round" opacity=".42"/>
    <path d="M158 261c14-11 29-12 46-3" fill="none" stroke="#9279dd" stroke-width="2.8" stroke-linecap="round" opacity=".36"/>
    <path d="M163 309c16 5 32 5 48 0" fill="none" stroke="#9279dd" stroke-width="2.8" stroke-linecap="round" opacity=".28"/>
